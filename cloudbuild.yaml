substitutions:
  _REGION: asia-southeast1
  _REPO: literate
  _WEB_SERVICE: literate-web
  _WORKER_SERVICE: literate-worker

steps:
  # Build the Next.js web app image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_WEB_SERVICE}:$SHORT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_WEB_SERVICE}:latest"
      - "-f"
      - "Dockerfile"
      - "."
    id: "build-web"

  # Build the BullMQ worker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_WORKER_SERVICE}:$SHORT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_WORKER_SERVICE}:latest"
      - "-f"
      - "Dockerfile.worker"
      - "."
    id: "build-worker"

  # Push web image
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "--all-tags", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_WEB_SERVICE}"]
    id: "push-web"
    waitFor: ["build-web"]

  # Push worker image
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "--all-tags", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_WORKER_SERVICE}"]
    id: "push-worker"
    waitFor: ["build-worker"]

  # Deploy web app to Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "${_WEB_SERVICE}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_WEB_SERVICE}:$SHORT_SHA"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--port"
      - "3000"
      - "--allow-unauthenticated"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "3"
      - "--memory"
      - "512Mi"
      - "--cpu"
      - "1"
      - "--vpc-connector"
      - "literate-connector"
      - "--vpc-egress"
      - "private-ranges-only"
    id: "deploy-web"
    waitFor: ["push-web"]

  # Deploy worker to Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "${_WORKER_SERVICE}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_WORKER_SERVICE}:$SHORT_SHA"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--port"
      - "8080"
      - "--no-allow-unauthenticated"
      - "--min-instances"
      - "1"
      - "--max-instances"
      - "2"
      - "--memory"
      - "512Mi"
      - "--cpu"
      - "1"
      - "--no-cpu-throttling"
      - "--vpc-connector"
      - "literate-connector"
      - "--vpc-egress"
      - "private-ranges-only"
    id: "deploy-worker"
    waitFor: ["push-worker"]

options:
  logging: CLOUD_LOGGING_ONLY